name: build

# Costruisce i binari per Mac e Windows.
# - Ad ogni push di un tag "v*" (es. v0.1.0) crea una Release con .app(zip) e .exe allegati.
# - Lanciabile anche a mano da GitHub (Actions → build → Run workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: HAL-Agent-mac
          - os: windows-latest
            artifact: HAL-Agent-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller HAL_Agent.spec --noconfirm

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -q "HAL-Agent-mac.zip" "HAL Agent.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.zip
            dist/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # necessario per creare la Release e allegare i file
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
